<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางเวรสำหรับวิทยุ สน.ลำหิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-background"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="glass-panel main-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fa-solid fa-walkie-talkie"></i>
                    <div>
                        <h1>ศูนย์วิทยุ สน.ลำหิน</h1>
                        <p>ระบบเช็คตารางเวรและภารกิจ</p>
                    </div>
                </div>
                <div class="search-container">
                    <div class="search-box">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหาชื่อ หรือ ยศ...">
                    </div>
                    <div class="date-picker-box">
                        <i class="fa-regular fa-calendar"></i>
                        <input type="date" id="dateFilter">
                    </div>
                </div>
            </div>
        </header>

        <!-- Top Section: Calendar & Search Results -->
        <div class="calendar-top-section">
            <div class="glass-panel calendar-panel">
                <div class="calendar-header">
                    <button id="prevMonth" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 id="currentMonthLabel">มกราคม 2026</h3>
                    <button id="nextMonth" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="calendar-grid">
                    <div class="weekday">อา</div><div class="weekday">จ</div><div class="weekday">อ</div><div class="weekday">พ</div><div class="weekday">พฤ</div><div class="weekday">ศ</div><div class="weekday">ส</div>
                </div>
                <div id="calendarDays" class="calendar-days"></div>
            </div>

            <!-- Search Results panel (hidden by default) -->
            <div class="glass-panel search-results-panel" id="searchResultsPanel" style="display: none;">
                <h3><i class="fa-solid fa-list-ul"></i> ผลการค้นหา</h3>
                <div id="searchResultsList" class="search-list">
                    <!-- Results injected here -->
                </div>
            </div>
        </div>

        <!-- Bottom Section: Daily Info -->
        <div class="content-grid-bottom">
            <div class="main-column">
                <h2 class="section-title" id="displayDateLabel">ข้อมูลประจำวันนี้</h2>
                
                <!-- Duty Card -->
                <div class="glass-panel card duty-card">
                    <div class="card-header">
                        <i class="fa-solid fa-user-shield"></i>
                        <h3>พนักงานสอบสวนเวร</h3>
                    </div>
                    <div class="card-body" id="investigatorDuty">
                        <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> กำลังโหลด...</div>
                    </div>
                </div>

                <div class="glass-panel card duty-card">
                    <div class="card-header">
                        <i class="fa-solid fa-user-group"></i>
                        <h3>ผู้ช่วยพนักงานสอบสวน</h3>
                    </div>
                    <div class="card-body" id="assistantDuty">
                        <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> กำลังโหลด...</div>
                    </div>
                </div>

                <!-- Mission Card -->
                <div class="glass-panel card mission-card">
                    <div class="card-header">
                        <i class="fa-solid fa-clipboard-list"></i>
                        <h3>ภารกิจ</h3>
                    </div>
                    <div class="card-body" id="dailyMissions">
                        <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> กำลังโหลด...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js?v=4"></script>
</body>
</html>
