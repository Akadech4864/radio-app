<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางเวร/ภารกิจ งานสอบสวน</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=22">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-background"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="glass-panel main-header">
            <div class="header-content header-single-row">
                <div class="logo logo-compact">
                    <img src="logo.png" alt="Logo สน.ลำหิน" class="police-logo">
                    <h1>ตารางเวร/ภารกิจ งานสอบสวน</h1>
                </div>
                
                <div class="search-container compact-search">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <select id="searchInput" class="search-select">
                            <option value="">ค้นหาจากรายชื่อ...</option>
                        </select>
                    </div>
                    <button id="resetHomeBtn" class="glass-panel reset-btn">
                        ค่าเริ่มต้น
                    </button>
                </div>
            </div>
        </header>

        <!-- Top Section: Calendar -->
        <div class="calendar-top-section">
            <div id="searchLegend" style="background: rgba(37,99,235,0.1); border: 1px solid var(--primary); padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem;">
                <div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
                    <span>
                        <span style="display: inline-block; width: 6px; height: 6px; background: red; border-radius: 50%; vertical-align: middle; margin-right: 5px;"></span> วันนี้
                    </span>
                    <span>
                        <span style="display: inline-block; width: 14px; height: 14px; background: rgba(37, 99, 235, 0.4); border: 1px solid var(--primary-light); border-radius: 4px; vertical-align: middle; margin-right: 5px;"></span> วันที่เข้าเวร
                    </span>
                    <span>
                        <span style="display: inline-block; width: 6px; height: 6px; background: #f97316; border-radius: 50%; vertical-align: middle; margin-right: 5px;"></span> มีภารกิจ
                    </span>
                </div>
            </div>

            <div class="glass-panel calendar-panel">
                <div class="calendar-header">
                    <button id="prevMonth" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 id="currentMonthLabel">มกราคม 2026</h3>
                    <button id="nextMonth" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="calendar-grid">
                    <div class="weekday">อา</div><div class="weekday">จ</div><div class="weekday">อ</div><div class="weekday">พ</div><div class="weekday">พฤ</div><div class="weekday">ศ</div><div class="weekday">ส</div>
                </div>
                <div id="calendarDays" class="calendar-days"></div>
            </div>

            <!-- Search Results panel (hidden by default) -->
            <div class="glass-panel search-results-panel" id="searchResultsPanel" style="display: none; margin-top: 20px;">
                <h3><i class="fa-solid fa-list-ul"></i> ผลการค้นหา</h3>
                <div id="searchResultsList" class="search-list">
                    <!-- Results injected here -->
                </div>
            </div>
        </div>

        <!-- Bottom Section: Daily Info -->
        <div class="content-grid-bottom">
            <div class="main-column">
                <h2 class="section-title" id="displayDateLabel">ข้อมูลประจำวันนี้</h2>
                
                <div class="card glass-panel highlight-border duty-card">
                    <div class="card-header">
                        <i class="fa-solid fa-user-shield"></i>
                        <h3>พนักงานสอบสวนเวร</h3>
                    </div>
                    <div class="card-body" id="investigatorDuty">
                        <div class="loading-spinner"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="card glass-panel duty-card">
                    <div class="card-header">
                        <i class="fa-solid fa-user-tie"></i>
                        <h3>ผู้ช่วยพนักงานสอบสวน</h3>
                    </div>
                    <div class="card-body" id="assistantDuty">
                        <div class="loading-spinner"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Missions -->
            <div class="side-column">
                <div class="card glass-panel mission-card">
                    <div class="card-header">
                        <i class="fa-solid fa-clipboard-list"></i>
                        <h3>ภารกิจวันนี้</h3>
                    </div>
                    <div class="card-body" id="dailyMissions">
                        <div class="loading-spinner"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js?v=20"></script>
</body>
</html>
